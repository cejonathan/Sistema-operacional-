<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controle de VTR</title>
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        :root {
            --font-sans: 'Inter', sans-serif;
        }
        
        body {
            font-family: var(--font-sans);
            background-color: #f8fafc;
            color: #1e293b;
            -webkit-tap-highlight-color: transparent;
        }

        .safe-bottom {
            padding-bottom: env(safe-area-inset-bottom);
        }

        .glass {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .nav-active {
            color: #059669;
        }

        .nav-active i {
            transform: translateY(-2px);
            transition: transform 0.2s ease;
        }

        .card-shadow {
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }

        /* Custom animations */
        @keyframes slideUp {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .animate-slide-up {
            animation: slideUp 0.3s ease-out forwards;
        }

        /* Hide scrollbar */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>
<body class="min-h-screen bg-slate-50">
    <!-- Header -->
    <header class="w-full glass border-b border-slate-200 px-4 py-3 flex items-center justify-between">
        <div class="flex items-center gap-2">
            <div class="bg-emerald-600 p-1.5 rounded-lg">
                <i data-lucide="shield" class="w-5 h-5 text-white"></i>
            </div>
            <div class="flex items-center gap-2">
                <h1 id="header-title" class="font-bold text-lg tracking-tight">${state.settings.headerTitle || 'Agente de Trânsito'}</h1>
                <button onclick="editHeaderTitle()" class="p-1 text-slate-400 hover:text-emerald-600 transition-colors">
                    <i data-lucide="edit-3" class="w-3.5 h-3.5"></i>
                </button>
            </div>
        </div>
        <div id="status-badge" class="hidden px-2 py-1 rounded-full text-[10px] font-bold uppercase tracking-wider bg-green-100 text-green-700 border border-green-200">
            KM ABERTO
        </div>
    </header>

    <!-- Navigation (Moved to Top) -->
    <nav class="sticky top-0 z-50 glass border-b border-slate-200">
        <div class="max-w-md mx-auto flex justify-around items-center h-16">
            <button onclick="switchView('km')" id="nav-km" class="flex flex-col items-center gap-1 text-slate-500 transition-colors">
                <i data-lucide="gauge" class="w-6 h-6"></i>
                <span class="text-[10px] font-medium uppercase tracking-tighter">Viatura</span>
            </button>
            <button onclick="switchView('km2')" id="nav-km2" class="flex flex-col items-center gap-1 text-slate-500 transition-colors">
                <i data-lucide="clipboard-check" class="w-6 h-6"></i>
                <span class="text-[10px] font-medium uppercase tracking-tighter">Teste Ocorrência</span>
            </button>
            <button onclick="switchView('ocorrencia')" id="nav-ocorrencia" class="flex flex-col items-center gap-1 text-slate-500 transition-colors">
                <i data-lucide="file-text" class="w-6 h-6"></i>
                <span class="text-[10px] font-medium uppercase tracking-tighter">Ocorrência</span>
            </button>
            <button onclick="switchView('historico')" id="nav-historico" class="flex flex-col items-center gap-1 text-slate-500 transition-colors">
                <i data-lucide="history" class="w-6 h-6"></i>
                <span class="text-[10px] font-medium uppercase tracking-tighter">Histórico</span>
            </button>
            <button onclick="switchView('config')" id="nav-config" class="flex flex-col items-center gap-1 text-slate-500 transition-colors">
                <i data-lucide="settings" class="w-6 h-6"></i>
                <span class="text-[10px] font-medium uppercase tracking-tighter">Ajustes</span>
            </button>
        </div>
    </nav>

    <!-- Main Content -->
    <main id="app-content" class="max-w-md mx-auto p-4 space-y-6">
        <!-- Views will be injected here -->
    </main>

    <!-- Modals Container -->
    <div id="modal-container" class="fixed inset-0 z-[60] hidden flex items-end sm:items-center justify-center p-4 bg-black/40 backdrop-blur-sm transition-all duration-300 opacity-0 overflow-y-auto">
        <div id="modal-content" class="w-full max-w-md bg-white rounded-t-2xl sm:rounded-2xl p-6 shadow-2xl transform translate-y-20 opacity-0 transition-all duration-300 my-auto">
            <!-- Modal content injected here -->
        </div>
    </div>

    <script>
        // --- Constants & State ---
        const CODIGOS_DEFAULT = [
            "1 Acompanhamento de alunos", "2 Apoio em obras", "3 Apoio em eventos", "4 Apoio ao agente de trânsito",
            "5 Acompanhamento de veículos (escolta)", "6 Fiscalização de caminhão", "7 COI", "8 Ação educativa",
            "9 Autorização de Caçamba/Caminhão", "10 Apoio órgão público/EDP/Telefonia", "11 Monitoramento",
            "12 Sinistro de trânsito sem vítima", "13 Sinistro de trânsito com vítima", "14 Animais na pista",
            "15 Trabalho administrativo", "16 Transporte interno", "17 Solicitação de munícipe", "18 Operação em semáforo",
            "19 Fiscalização em circulação", "20 Apoio a veículo quebrado", "21 Travessia de alunos", "22 Apoio a feira livre",
            "23 Desvio de trânsito", "24 Deslocamento ao centro do servidor", "25 Apoio a eventos religiosos",
            "26 Aferição de radar", "27 Autorizar veículos a passar no vermelho", "28 Manutenção da VTR", "29 Obra SAAE",
            "30 Remoção de veículo", "31 Remoção de veículo abandonado", "32 Apoio a pintura", "33 Apoio a poda de árvore",
            "34 Apoio a troca de poste/Recolha de fios caídos", "35 Deslocamento para diretoria de trânsito",
            "36 Deslocamento limpar VTR", "37 Blitz", "38 Fiscalização em extensão", "39 Controle de fluxo",
            "40 Fiscalização em ponto fixo", "41 Posturas", "42 Vistoria"
        ];
        const LOCAIS_DEFAULT = Array.from({ length: 15 }, (_, i) => `Setor ${i + 1}`);
        const DET_CODES = ["DET 02", "DET 03", "DET 06", "DET 07", "DET 08", "DET 10", "DET 12", "DET 17", "DET 18", "DET 20", "DET 22", "DET 35", "DET 41", "DET 44", "DET 46", "DET 47", "DET 49", "DET 54", "DET 55", "DET 59", "DET 61", "DET 62", "DET 65", "DET 67", "DET 68", "DET 74", "DET 75", "DET 86", "DET 89", "DET 90"];
        const VTR_CODES = ["AL 1389", "AL 1390", "AL 1391", "AL 1392", "AL 1393", "AL 1394", "AL 1395", "MH 01", "MH 02", "MH 03", "MH 04", "MH 05", "MH 06", "MH 07", "MH 08"];

        const savedSettings = JSON.parse(localStorage.getItem('settings') || '{}');
        let state = {
            currentView: 'km',
            kmRecords: JSON.parse(localStorage.getItem('kmRecords') || '[]'),
            kmRecords2: JSON.parse(localStorage.getItem('kmRecords2') || '[]'),
            reports: JSON.parse(localStorage.getItem('reports') || '[]'),
            settings: {
                agente: '',
                vtr: VTR_CODES[0],
                headerTitle: 'Agente de Trânsito',
                codigos: CODIGOS_DEFAULT,
                locais: LOCAIS_DEFAULT,
                urlKM: 'https://script.google.com/macros/s/AKfycbkm_R2mt_yMJsikxogcFztxN_nXT7hXQ0P98vIC_RmzMf5W1DmdV660UhoPJhDS7nytA/exec',
                urlOcorrencia: 'https://script.google.com/macros/s/AKfycbwoCOhMqwIc58zh3l-C0-fpdERVMk3AuIUqQTEuOjS_Ho4Qp7zzPh4KbbqNV8gfomWe/exec',
                ...savedSettings
            }
        };

        // --- Utilities ---
        async function sendToGoogleSheets(data, url) {
            if (!url) return;
            try {
                const payload = {
                    timestamp: new Date().toLocaleString('pt-BR'),
                    ...data
                };
                
                console.log('Enviando dados para Google Sheets:', payload);
                
                // Sending as a simple stringified JSON with no-cors.
                // Google Apps Script will receive this in e.postData.contents
                await fetch(url, {
                    method: 'POST',
                    mode: 'no-cors',
                    cache: 'no-cache',
                    body: JSON.stringify(payload)
                });
                
                showToast('Dados enviados para a planilha!', 'success');
            } catch (error) {
                console.error('Erro ao enviar para Google Sheets:', error);
                showToast('Erro ao sincronizar com a planilha.', 'error');
            }
        }

        function saveState() {
            localStorage.setItem('kmRecords', JSON.stringify(state.kmRecords));
            localStorage.setItem('kmRecords2', JSON.stringify(state.kmRecords2));
            localStorage.setItem('reports', JSON.stringify(state.reports));
            localStorage.setItem('settings', JSON.stringify(state.settings));
            updateStatusBadge();
        }

        function updateStatusBadge() {
            const activeKM1 = state.kmRecords.find(r => r.status === 'aberto');
            const activeKM2 = state.kmRecords2.find(r => r.status === 'aberto');
            const badge = document.getElementById('status-badge');
            if (activeKM1 || activeKM2) {
                badge.classList.remove('hidden');
            } else {
                badge.classList.add('hidden');
            }
        }

        function formatDate(date) {
            return new Intl.DateTimeFormat('pt-BR').format(new Date(date));
        }

        function formatTime(date) {
            return new Intl.DateTimeFormat('pt-BR', { hour: '2-digit', minute: '2-digit' }).format(new Date(date));
        }

        function generateId() {
            return Math.random().toString(36).substr(2, 9);
        }

        function isEditable(timestamp) {
            if (!timestamp) return false;
            const created = new Date(timestamp).getTime();
            const now = new Date().getTime();
            const diffHours = (now - created) / (1000 * 60 * 60);
            return diffHours <= 24;
        }

        // --- View Management ---
        function switchView(view) {
            state.currentView = view;
            render();
            
            // Update Navigation UI
            document.querySelectorAll('nav button').forEach(btn => btn.classList.remove('nav-active'));
            document.getElementById(`nav-${view}`).classList.add('nav-active');
        }

        function render() {
            const content = document.getElementById('app-content');
            content.innerHTML = '';
            
            // Update header title in case it changed
            const headerTitle = document.getElementById('header-title');
            if (headerTitle) headerTitle.textContent = state.settings.headerTitle || 'Agente de Trânsito';

            switch(state.currentView) {
                case 'km': renderKMView(content, 'kmRecords'); break;
                case 'km2': renderKMView(content, 'kmRecords2'); break;
                case 'ocorrencia': renderOcorrenciaView(content); break;
                case 'historico': renderHistoricoView(content); break;
                case 'config': renderConfigView(content); break;
            }
            
            lucide.createIcons();
            window.scrollTo(0, 0);
        }

        // --- KM View ---
        function renderKMView(container, recordsKey) {
            const isTestView = recordsKey === 'kmRecords2';
            const activeRecords = state[recordsKey].filter(r => r.status === 'aberto');
            const activeRecord = activeRecords[0]; 
            
            // UI state for showing form when active records exist
            if (!state.ui) state.ui = {};
            const showForm = !activeRecord || state.ui.showTestForm;
            
            // Pre-fill logic for Teste Ocorrência: use active VTR/Team from Viatura 1 if available
            let defaultVtr = '';
            let defaultCondutor = '';
            let defaultApoio = '';
            
            if (isTestView) {
                const mainActive = state.kmRecords.find(r => r.status === 'aberto');
                if (mainActive) {
                    defaultVtr = mainActive.vtr;
                    defaultCondutor = mainActive.condutor;
                    defaultApoio = mainActive.apoio;
                }
            }

            const div = document.createElement('div');
            div.className = 'animate-slide-up space-y-4';
            
            if (showForm) {
                const formDiv = document.createElement('div');
                formDiv.className = 'bg-white p-6 rounded-2xl border border-slate-200 card-shadow';
                formDiv.innerHTML = `
                    <form id="km-open-form" class="space-y-4">
                        <div class="space-y-1">
                            <label class="text-xs font-semibold text-slate-500 uppercase">Viatura</label>
                            <div class="space-y-2">
                                <select name="vtr_select" onchange="toggleManualInput(this, 'vtr_manual')" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-emerald-500 outline-none">
                                    <option value="" ${!defaultVtr ? 'selected' : ''} disabled>Selecionar</option>
                                    ${VTR_CODES.map(v => `<option value="${v}" ${v === defaultVtr ? 'selected' : ''}>${v}</option>`).join('')}
                                    <option value="MANUAL" ${defaultVtr && !VTR_CODES.includes(defaultVtr) ? 'selected' : ''}>OUTRO (Escrever manualmente)</option>
                                </select>
                                <input type="text" id="vtr_manual" name="vtr_manual" value="${defaultVtr && !VTR_CODES.includes(defaultVtr) ? defaultVtr : ''}" placeholder="Digite a viatura" class="${defaultVtr && !VTR_CODES.includes(defaultVtr) ? '' : 'hidden'} w-full p-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-emerald-500 outline-none">
                            </div>
                        </div>
                        <div class="space-y-1">
                            <label class="text-xs font-semibold text-slate-500 uppercase">Condutor</label>
                            <div class="space-y-2">
                                <select name="condutor_select" onchange="toggleManualInput(this, 'condutor_manual')" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-emerald-500 outline-none">
                                    <option value="" ${!defaultCondutor ? 'selected' : ''} disabled>Selecionar</option>
                                    ${DET_CODES.map(d => `<option value="${d}" ${d === defaultCondutor ? 'selected' : ''}>${d}</option>`).join('')}
                                    <option value="MANUAL" ${defaultCondutor && !DET_CODES.includes(defaultCondutor) ? 'selected' : ''}>OUTRO (Escrever manualmente)</option>
                                </select>
                                <input type="text" id="condutor_manual" name="condutor_manual" value="${defaultCondutor && !DET_CODES.includes(defaultCondutor) ? defaultCondutor : ''}" placeholder="Digite condutor" class="${defaultCondutor && !DET_CODES.includes(defaultCondutor) ? '' : 'hidden'} w-full p-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-emerald-500 outline-none">
                            </div>
                        </div>
                        <div class="space-y-1">
                            <label class="text-xs font-semibold text-slate-500 uppercase">Apoio</label>
                            <div class="space-y-2">
                                <select name="apoio_select" onchange="toggleManualInput(this, 'apoio_manual')" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-emerald-500 outline-none">
                                    <option value="" ${!defaultApoio ? 'selected' : ''} disabled>Selecionar</option>
                                    ${DET_CODES.map(d => `<option value="${d}" ${d === defaultApoio ? 'selected' : ''}>${d}</option>`).join('')}
                                    <option value="MANUAL" ${defaultApoio && !DET_CODES.includes(defaultApoio) ? 'selected' : ''}>OUTRO (Escrever manualmente)</option>
                                </select>
                                <input type="text" id="apoio_manual" name="apoio_manual" value="${defaultApoio && !DET_CODES.includes(defaultApoio) ? defaultApoio : ''}" placeholder="Digite apoio" class="${defaultApoio && !DET_CODES.includes(defaultApoio) ? '' : 'hidden'} w-full p-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-emerald-500 outline-none">
                            </div>
                        </div>
                        ${isTestView ? `
                        <div class="space-y-1">
                            <label class="text-xs font-semibold text-slate-500 uppercase">Código</label>
                            <div class="space-y-2">
                                <select name="codigo_select" onchange="toggleManualInput(this, 'codigo_manual')" required class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-emerald-500 outline-none">
                                    <option value="" selected disabled>Selecionar Código</option>
                                    ${state.settings.codigos.map(c => `<option value="${c}">${c}</option>`).join('')}
                                    <option value="MANUAL">Outros (Escrever manualmente)</option>
                                </select>
                                <input type="text" id="codigo_manual" name="codigo_manual" placeholder="Digite o código" class="hidden w-full p-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-emerald-500 outline-none">
                            </div>
                        </div>
                        <div class="space-y-1">
                            <label class="text-xs font-semibold text-slate-500 uppercase">Local</label>
                            <div class="space-y-2">
                                <select name="local_select" onchange="toggleManualInput(this, 'local_manual')" required class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-emerald-500 outline-none">
                                    <option value="" selected disabled>Selecionar Local</option>
                                    ${state.settings.locais.map(l => `<option value="${l}">${l}</option>`).join('')}
                                    <option value="MANUAL">Outros (Escrever manualmente)</option>
                                </select>
                                <input type="text" id="local_manual" name="local_manual" placeholder="Digite o local" class="hidden w-full p-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-emerald-500 outline-none">
                            </div>
                        </div>
                        ` : ''}
                        <div class="space-y-1">
                            <label class="text-xs font-semibold text-slate-500 uppercase">Data</label>
                            <input type="date" name="data" value="${new Date().toISOString().split('T')[0]}" required class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-emerald-500 outline-none">
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            ${!isTestView ? `
                            <div class="space-y-1">
                                <label class="text-xs font-semibold text-slate-500 uppercase">KM Inicial</label>
                                <input type="number" name="kmInicial" placeholder="00000" required class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-emerald-500 outline-none">
                            </div>
                            ` : ''}
                            <div class="space-y-1 ${isTestView ? 'col-span-2' : ''}">
                                <label class="text-xs font-semibold text-slate-500 uppercase">Hora Inicial</label>
                                <input type="time" name="horaInicial" value="${new Date().toLocaleTimeString('pt-BR', {hour: '2-digit', minute:'2-digit'})}" required class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-emerald-500 outline-none">
                            </div>
                        </div>
                        <button type="submit" class="w-full bg-blue-600 text-white font-bold py-4 rounded-xl shadow-lg shadow-blue-200 active:scale-[0.98] transition-transform uppercase">
                            ${isTestView ? 'ABRIR OCORRÊNCIA' : 'ABRIR KM'}
                        </button>
                        ${isTestView && activeRecord ? `
                        <button type="button" onclick="state.ui.showTestForm = false; render();" class="w-full bg-slate-200 text-slate-700 font-bold py-3 rounded-xl active:scale-[0.98] transition-transform uppercase text-sm">
                            Cancelar
                        </button>
                        ` : ''}
                    </form>
                `;
                div.appendChild(formDiv);
                
                formDiv.querySelector('#km-open-form').onsubmit = (e) => {
                    e.preventDefault();
                    const formData = new FormData(e.target);
                    
                    const vtr = formData.get('vtr_select') === 'MANUAL' ? formData.get('vtr_manual') : formData.get('vtr_select');
                    const condutor = formData.get('condutor_select') === 'MANUAL' ? formData.get('condutor_manual') : formData.get('condutor_select');
                    const apoio = formData.get('apoio_select') === 'MANUAL' ? formData.get('apoio_manual') : formData.get('apoio_select');
                    const codigo = formData.get('codigo_select') === 'MANUAL' ? formData.get('codigo_manual') : formData.get('codigo_select');
                    const local = formData.get('local_select') === 'MANUAL' ? formData.get('local_manual') : formData.get('local_select');

                    if (!vtr || !condutor) {
                        showToast('Viatura e Condutor são obrigatórios!', 'error');
                        return;
                    }

                    const newRecord = {
                        id: generateId(),
                        vtr: vtr,
                        condutor: condutor,
                        apoio: apoio,
                        codigo: codigo || null,
                        local: local || null,
                        data: formData.get('data'),
                        kmInicial: formData.get('kmInicial') || 0,
                        horaInicial: formData.get('horaInicial'),
                        status: 'aberto',
                        timestamp: new Date().toISOString()
                    };
                    state[recordsKey].push(newRecord);

                    // Send to Google Sheets
                    const url = isTestView ? state.settings.urlOcorrencia : state.settings.urlKM;
                    sendToGoogleSheets({
                        tipo: isTestView ? 'Abertura Ocorrência' : 'Abertura KM',
                        ...newRecord
                    }, url);

                    state.ui.showTestForm = false;
                    saveState();
                    render();
                };
            } else {
                // If active records exist and form is not shown, show a button to open new one
                if (isTestView) {
                    const btnDiv = document.createElement('div');
                    btnDiv.innerHTML = `
                        <button onclick="state.ui.showTestForm = true; render();" class="w-full bg-blue-600 text-white font-bold py-4 rounded-2xl shadow-lg shadow-blue-200 active:scale-[0.98] transition-transform uppercase flex items-center justify-center gap-2">
                            <i data-lucide="plus" class="w-5 h-5"></i>
                            ABRIR NOVA OCORRÊNCIA
                        </button>
                    `;
                    div.appendChild(btnDiv);
                }
            }

            // Render Active Records
            activeRecords.forEach(record => {
                const activeDiv = document.createElement('div');
                activeDiv.className = 'space-y-4';
                activeDiv.innerHTML = `
                    <div class="bg-emerald-600 text-white p-6 rounded-2xl shadow-xl shadow-emerald-200 relative overflow-hidden">
                        <div class="absolute -right-4 -top-4 opacity-10">
                            <i data-lucide="${isTestView ? 'clipboard-check' : 'gauge'}" class="w-32 h-32"></i>
                        </div>
                        <div class="relative z-10">
                            <div class="flex justify-between items-start mb-6">
                                <div>
                                    <p class="text-emerald-100 text-xs font-bold uppercase tracking-widest">${isTestView ? 'Ocorrência Ativa' : 'Em Serviço'}</p>
                                    <h3 class="text-2xl font-black">${record.vtr}</h3>
                                    <div class="flex flex-wrap gap-2 mt-1">
                                        ${record.codigo ? `<p class="text-emerald-100 text-[10px] font-bold uppercase bg-white/10 px-2 py-0.5 rounded">${record.codigo}</p>` : ''}
                                        ${record.local ? `<p class="text-emerald-100 text-[10px] font-bold uppercase bg-white/10 px-2 py-0.5 rounded">${record.local}</p>` : ''}
                                    </div>
                                </div>
                                <button onclick="editKM('${record.id}', '${recordsKey}')" class="flex items-center gap-2 px-3 py-2 bg-white/20 rounded-lg backdrop-blur-sm hover:bg-white/30 transition-colors">
                                    <i data-lucide="edit-2" class="w-4 h-4"></i>
                                    <span class="text-[10px] font-bold uppercase">Editar</span>
                                </button>
                            </div>
                            <div class="grid grid-cols-2 gap-4">
                                ${!isTestView ? `
                                <div class="bg-white/10 p-3 rounded-xl">
                                    <p class="text-emerald-100 text-[10px] uppercase font-bold">KM Inicial</p>
                                    <p class="text-xl font-bold">${record.kmInicial}</p>
                                </div>
                                ` : ''}

                                </div>

                            <!-- Vítimas -->
                            <section class="space-y-4">
                                <div class="flex justify-between items-center border-b border-slate-100 pb-1">
                                    <h4 class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Vítimas</h4>
                                    <button type="button" onclick="addVitima()" class="text-red-600 text-[10px] font-bold uppercase tracking-wider flex items-center gap-1">

                            <!-- Apoio -->

                                <div class="space-y-4">
                                    <div class="p-4 bg-emerald-50/50 rounded-xl border border-emerald-100 space-y-3">

                                        <input type="text" placeholder="Unidade (ex: 12º BPM)" id="apoio-pol-unidade" value="${apoioPolicial.unidade}" class="w-full p-2 bg-white border border-emerald-100 rounded-lg text-xs outline-none">
                                        <input type="text" placeholder="Responsável" id="apoio-pol-resp" value="${apoioPolicial.responsavel}" class="w-full p-2 bg-white border border-emerald-100 rounded-lg text-xs outline-none">
                                        <input type="text" placeholder="RO / BOPM" id="apoio-pol-reg" value="${apoioPolicial.registro}" class="w-full p-2 bg-white border border-emerald-100 rounded-lg text-xs outline-none">
                                    </div>
                                    <div class="p-4 bg-red-50/50 rounded-xl border border-red-100 space-y-3">
                                        <p class="text-[10px] font-bold text-red-600 uppercase tracking-wider">Médico</p>

                                    <label class="text-xs font-semibold text-slate-500 uppercase">Narrativa</label>
                                    <textarea name="resumo" id="sin-resumo" rows="4" placeholder="Descreva detalhadamente o ocorrido..." class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none resize-none"></textarea>

                                                <img src="${p}" class="w-full h-full object-cover">
                                                <button type="button" onclick="removePhoto(${i})" class="absolute top-1 right-1 bg-red-600 text-white p-1 rounded-full shadow-lg">

                                    <label class="flex flex-col items-center justify-center w-full h-24 border-2 border-dashed border-slate-300 rounded-xl cursor-pointer hover:bg-slate-50 transition-colors">
                                        <i data-lucide="camera" class="text-slate-400"></i>
                                        <span class="text-[10px] text-slate-500 mt-1">Adicionar Fotos</span>
                                        <input type="file" id="photo-input" multiple accept="image/*" class="hidden">

                            <button type="submit" class="w-full bg-red-600 text-white font-bold py-4 rounded-xl shadow-lg active:scale-[0.98] transition-transform">
                                FINALIZAR RELATÓRIO
                            </button>
                        </form>
                    </div>
                `;
                lucide.createIcons();
                setupFormEvents();
            }

            function setupFormEvents() {
                const photoInput = document.getElementById('photo-input');
                if (photoInput) {
                    photoInput.onchange = (e) => {
                        const files = Array.from(e.target.files);
                        files.forEach(file => {
                            const reader = new FileReader();
                            reader.onload = (ev) => {
                                // Basic compression using canvas
                                const img = new Image();
                                img.src = ev.target.result;
                                img.onload = () => {
                                    const canvas = document.createElement('canvas');
                                    const MAX_WIDTH = 800;
                                    const scaleSize = MAX_WIDTH / img.width;
                                    canvas.width = MAX_WIDTH;
                                    canvas.height = img.height * scaleSize;
                                    const ctx = canvas.getContext('2d');
                                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                                    const compressed = canvas.toDataURL('image/jpeg', 0.7);
                                    photos.push(compressed);
                                    updateFormUI();
                                };
                            };
                            reader.readAsDataURL(file);
                        });
                    };
                }

                const form = document.getElementById('sinistro-form');
                if (form) {
                    form.onsubmit = (e) => {
                        e.preventDefault();
                        const activeKM = state.kmRecords.find(r => r.status === 'aberto');
                        
                        // Capture support data manually since they are not in the main form object
                        apoioPolicial.unidade = document.getElementById('apoio-pol-unidade').value;
                        apoioPolicial.responsavel = document.getElementById('apoio-pol-resp').value;
                        apoioPolicial.registro = document.getElementById('apoio-pol-reg').value;
                        
                        socorroMedico.unidade = document.getElementById('apoio-med-unidade').value;
                        socorroMedico.responsavel = document.getElementById('apoio-med-resp').value;
                        socorroMedico.hospital = document.getElementById('apoio-med-hosp').value;

                        const report = {
                            id: generateId(),
                            type: 'especial',
                            agent: state.settings.agente,
                            timestamp: Date.now(),
                            data: {
                                data: document.getElementById('sin-data').value,
                                hora: document.getElementById('sin-hora').value,
                                endereco: document.getElementById('sin-endereco').value,
                                caracteristica: document.getElementById('sin-caracteristica').value,
                                resumo: document.getElementById('sin-resumo').value,
                                photos: photos,
                                envolvidos: envolvidos,
                                vitimas: vitimas,
                                apoioPolicial: apoioPolicial,
                                socorroMedico: socorroMedico,
                                vtrs: activeKM ? [activeKM.vtr] : [state.settings.vtr],
                                agentes: activeKM ? [activeKM.condutor, activeKM.apoio].filter(Boolean) : [state.settings.agente]
                            }
                        };
                        state.reports.push(report);

                        // Send to Google Sheets
                        sendToGoogleSheets({
                            tipo: 'Sinistro',
                            ...report.data,
                            photos: undefined, // Don't send large photo data to sheets
                            envolvidos: JSON.stringify(envolvidos),
                            vitimas: JSON.stringify(vitimas),
                            apoioPolicial: JSON.stringify(apoioPolicial),
                            socorroMedico: JSON.stringify(socorroMedico)
                        }, state.settings.urlOcorrencia);

                        saveState();
                        showToast('Relatório salvo com sucesso!');
                        switchView('historico');
                    };
                }
            }

            // Expose helper functions to window for onclick handlers
            window.addEnvolvido = () => {
                showModal(`
                    <h3 class="text-lg font-bold mb-4">Adicionar Envolvido</h3>
                    <div class="space-y-4">
                        <input type="text" id="env-nome" placeholder="Nome Completo" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none">
                        <input type="text" id="env-doc" placeholder="CPF / RG / CNH" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none">
                        <input type="text" id="env-veiculo" placeholder="Veículo (Placa/Modelo)" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none">
                        <input type="tel" id="env-tel" placeholder="Telefone" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none">
                        <div class="flex gap-2">
                            <button onclick="closeModal()" class="flex-1 py-3 border border-slate-200 rounded-xl font-bold">Cancelar</button>
                            <button onclick="confirmAddEnvolvido()" class="flex-1 py-3 bg-blue-600 text-white rounded-xl font-bold">Adicionar</button>
                        </div>
                    </div>
                `);
            };

            window.confirmAddEnvolvido = () => {
                const nome = document.getElementById('env-nome').value;
                const documento = document.getElementById('env-doc').value;
                const veiculo = document.getElementById('env-veiculo').value;
                const telefone = document.getElementById('env-tel').value;
                envolvidos.push({ nome, documento, veiculo, telefone });
                closeModal();
                updateFormUI();
            };

            window.removeEnvolvido = (i) => {
                envolvidos.splice(i, 1);
                updateFormUI();
            };

            window.addVitima = () => {
                showModal(`
                    <h3 class="text-lg font-bold mb-4">Registrar Vítima</h3>
                    <div class="space-y-4">
                        <input type="text" id="vit-nome" placeholder="Nome da Vítima" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none">
                        <select id="vit-estado" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none">
                            <option>Leve</option>
                            <option>Grave</option>
                            <option>Fatal</option>
                        </select>
                        <div class="flex gap-2">
                            <button onclick="closeModal()" class="flex-1 py-3 border border-slate-200 rounded-xl font-bold">Cancelar</button>
                            <button onclick="confirmAddVitima()" class="flex-1 py-3 bg-red-600 text-white rounded-xl font-bold">Adicionar</button>
                        </div>
                    </div>
                `);
            };

            window.confirmAddVitima = () => {
                const nome = document.getElementById('vit-nome').value;
                const estado = document.getElementById('vit-estado').value;
                vitimas.push({ nome, estado });
                closeModal();
                updateFormUI();
            };

            window.removeVitima = (i) => {
                vitimas.splice(i, 1);
                updateFormUI();
            };

            window.removePhoto = (i) => {
                photos.splice(i, 1);
                updateFormUI();
            };

            updateFormUI();
        }

        // --- Historico View ---
        function renderHistoricoView(container) {
            const div = document.createElement('div');
            div.className = 'animate-slide-up space-y-6';
            
            if (state.reports.length === 0) {
                div.innerHTML = `
                    <div class="flex flex-col items-center justify-center py-20 text-slate-400">
                        <i data-lucide="clipboard-list" class="w-16 h-16 mb-4 opacity-20"></i>
                        <p class="font-medium uppercase text-[10px]">Nenhum registro encontrado</p>
                    </div>
                `;
            } else {
                // Group by date
                const grouped = state.reports.sort((a, b) => b.timestamp - a.timestamp).reduce((acc, report) => {
                    const date = formatDate(report.timestamp);
                    if (!acc[date]) acc[date] = [];
                    acc[date].push(report);
                    return acc;
                }, {});
                
                Object.entries(grouped).forEach(([date, reports]) => {
                    const dateSection = document.createElement('div');
                    dateSection.className = 'space-y-3';
                    dateSection.innerHTML = `<h4 class="text-[10px] font-black text-slate-400 uppercase tracking-widest px-1">${date}</h4>`;
                    
                    reports.forEach(report => {
                        const card = document.createElement('div');
                        card.className = 'bg-white p-4 rounded-2xl border border-slate-200 card-shadow flex gap-4 items-start';
                        
                        let icon = 'file-text';
                        let color = 'blue';
                        let title = '';
                        let subtitle = '';
                        
                        if (report.type === 'log') {
                            icon = 'clock';
                            color = 'emerald';
                            title = report.data.codigo;
                            subtitle = `${report.data.inicio} - ${report.data.termino} | ${report.data.local}`;
                        } else if (report.type === 'simples') {
                            icon = 'list';
                            color = 'green';
                            title = `${report.data.items.length} Itens Registrados`;
                            subtitle = report.data.items.slice(0, 2).map(i => i.codigo.split(' ')[0]).join(', ') + (report.data.items.length > 2 ? '...' : '');
                        } else if (report.type === 'especial') {
                            icon = 'alert-triangle';
                            color = 'red';
                            title = report.data.caracteristica;
                            subtitle = report.data.endereco;
                        }
                        
                        card.innerHTML = `
                            <div class="w-10 h-10 bg-${color}-100 text-${color}-600 rounded-xl flex items-center justify-center shrink-0">
                                <i data-lucide="${icon}" class="w-5 h-5"></i>
                            </div>
                            <div class="flex-1 min-w-0">
                                <div class="flex justify-between items-start">
                                    <h5 class="font-bold text-slate-800 truncate">${title}</h5>
                                    <span class="text-[10px] text-slate-400 font-medium">${formatTime(report.timestamp)}</span>
                                </div>
                                <p class="text-xs text-slate-500 truncate">${subtitle}</p>
                                <div class="flex gap-2 mt-3">
                                    <button onclick="shareReport('${report.id}')" class="text-[10px] font-bold uppercase tracking-wider text-emerald-600 bg-emerald-50 px-3 py-1.5 rounded-lg flex items-center gap-1">
                                        <i data-lucide="share-2" class="w-3 h-3"></i> WhatsApp
                                    </button>
                                    ${isEditable(report.timestamp) ? `
                                    <button onclick="deleteReport('${report.id}')" class="text-[10px] font-bold uppercase tracking-wider text-red-600 bg-red-50 px-3 py-1.5 rounded-lg">
                                        Excluir
                                    </button>
                                    ` : `
                                    <span class="text-[10px] text-slate-400 font-bold uppercase italic px-3 py-1.5">Bloqueado</span>
                                    `}
                                </div>
                            </div>
                        `;
                        dateSection.appendChild(card);
                    });
                    div.appendChild(dateSection);
                });
            }
            
            container.appendChild(div);
            lucide.createIcons();
        }

        function deleteReport(id) {
            const report = state.reports.find(r => r.id === id);
            if (report && !isEditable(report.timestamp)) {
                showToast('Este registro não pode mais ser excluído (limite de 24h excedido).', 'error');
                return;
            }
            showModal(`
                <div class="text-center space-y-4">
                    <div class="w-16 h-16 bg-red-100 text-red-600 rounded-full flex items-center justify-center mx-auto">
                        <i data-lucide="trash-2" class="w-8 h-8"></i>
                    </div>
                    <h3 class="text-lg font-bold">Excluir Registro?</h3>
                    <p class="text-sm text-slate-500">Esta ação não pode ser desfeita.</p>
                    <div class="flex gap-2">
                        <button onclick="closeModal()" class="flex-1 py-3 border border-slate-200 rounded-xl font-bold">Cancelar</button>
                        <button onclick="confirmDeleteReport('${id}')" class="flex-1 py-3 bg-red-600 text-white rounded-xl font-bold">Excluir</button>
                    </div>
                </div>
            `);
            lucide.createIcons();
        }

        window.confirmDeleteReport = (id) => {
            state.reports = state.reports.filter(r => r.id !== id);
            saveState();
            closeModal();
            showToast('Registro excluído');
            render();
        };

        function shareReport(id) {
            const report = state.reports.find(r => r.id === id);
            let text = '';
            
            if (report.type === 'log') {
                text = `*RELATÓRIO DE ATIVIDADE*\n\n` +
                       `*Código:* ${report.data.codigo}\n` +
                       `*Local:* ${report.data.local}\n` +
                       `*Horário:* ${report.data.inicio} às ${report.data.termino}\n` +
                       `*Viatura:* ${report.data.vtr}\n` +
                       `*CONDUTOR / APOIO:* ${report.data.condutor}${report.data.apoio ? ' / ' + report.data.apoio : ''}`;
            } else if (report.type === 'simples') {
                text = `*REGISTRO SIMPLES*\n\n` +
                       report.data.items.map(i => `• ${i.codigo} - ${i.local}`).join('\n');
            } else if (report.type === 'especial') {
                text = `*RELATÓRIO DE SINISTRO*\n\n` +
                       `*Data/Hora:* ${report.data.data} ${report.data.hora}\n` +
                       `*Endereço:* ${report.data.endereco}\n` +
                       `*Tipo:* ${report.data.caracteristica}\n` +
                       `*Resumo:* ${report.data.resumo}\n\n`;

                if (report.data.envolvidos && report.data.envolvidos.length > 0) {
                    text += `*Envolvidos:*\n` + report.data.envolvidos.map(e => 
                        `- ${e.nome || 'N/A'} (${e.veiculo || 'N/A'})`
                    ).join('\n') + `\n\n`;
                }

                if (report.data.vitimas && report.data.vitimas.length > 0) {
                    text += `*Vítimas:*\n` + report.data.vitimas.map(v => 
                        `- ${v.nome || 'N/A'} (${v.estado})`
                    ).join('\n') + `\n\n`;
                }

                if (report.data.apoioPolicial && report.data.apoioPolicial.unidade) {
                    text += `*Apoio Policial:* ${report.data.apoioPolicial.unidade} - ${report.data.apoioPolicial.responsavel} (${report.data.apoioPolicial.registro})\n`;
                }

                if (report.data.socorroMedico && report.data.socorroMedico.unidade) {
                    text += `*Socorro Médico:* ${report.data.socorroMedico.unidade} - ${report.data.socorroMedico.responsavel} -> ${report.data.socorroMedico.hospital}\n`;
                }

                text += `\n*Viatura:* ${report.data.vtrs.join(', ')}\n` +
                        `*CONDUTOR / APOIO:* ${report.data.agentes.join(' / ')}`;
            }
            
            const url = `https://api.whatsapp.com/send?text=${encodeURIComponent(text)}`;
            window.open(url, '_blank');
        }

        // --- Config View ---
        function renderConfigView(container) {
            const div = document.createElement('div');
            div.className = 'animate-slide-up space-y-6';
            
            div.innerHTML = `
                <div class="bg-white p-6 rounded-2xl border border-slate-200 card-shadow">
                    <h3 class="text-lg font-bold mb-4 flex items-center gap-2 uppercase">
                        <i data-lucide="user" class="text-emerald-600"></i>
                        Perfil do Agente
                    </h3>
                    <form id="profile-form" class="space-y-4">
                        <div class="space-y-1">
                            <label class="text-xs font-semibold text-slate-500 uppercase">Nome Padrão</label>
                            <input type="text" name="agente" value="${state.settings.agente}" placeholder="Seu nome" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none">
                        </div>
                        <div class="space-y-1">
                            <label class="text-xs font-semibold text-slate-500 uppercase">Viatura Padrão</label>
                            <select name="vtr" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none">
                                ${VTR_CODES.map(v => `<option value="${v}" ${v === state.settings.vtr ? 'selected' : ''}>${v}</option>`).join('')}
                            </select>
                        </div>
                        <button type="submit" class="w-full bg-slate-800 text-white font-bold py-3 rounded-xl active:scale-[0.98] transition-transform uppercase">
                            SALVAR PERFIL
                        </button>
                    </form>
                </div>

                <div class="bg-white p-6 rounded-2xl border border-slate-200 card-shadow">
                    <h3 class="text-lg font-bold mb-4 flex items-center gap-2 uppercase">
                        <i data-lucide="link" class="text-emerald-600"></i>
                        Integração Google Sheets
                    </h3>
                    <form id="sheets-form" class="space-y-4">
                        <div class="space-y-1">
                            <label class="text-xs font-semibold text-slate-500 uppercase">URL Planilha KM</label>
                            <input type="text" name="urlKM" value="${state.settings.urlKM || ''}" placeholder="https://script.google.com/..." class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none text-xs">
                        </div>
                        <div class="space-y-1">
                            <label class="text-xs font-semibold text-slate-500 uppercase">URL Planilha Ocorrências</label>
                            <input type="text" name="urlOcorrencia" value="${state.settings.urlOcorrencia || ''}" placeholder="https://script.google.com/..." class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none text-xs">
                        </div>
                        <button type="submit" class="w-full bg-emerald-600 text-white font-bold py-3 rounded-xl active:scale-[0.98] transition-transform uppercase">
                            SALVAR CONFIGURAÇÕES
                        </button>
                    </form>
                </div>

                <div class="bg-white p-6 rounded-2xl border border-slate-200 card-shadow">
                    <h3 class="text-lg font-bold mb-4 flex items-center gap-2 uppercase">
                        <i data-lucide="database" class="text-slate-600"></i>
                        Dados e Backup
                    </h3>
                    <div class="space-y-3">
                        <button onclick="exportData()" class="w-full flex items-center justify-between p-4 bg-slate-50 rounded-xl border border-slate-100 active:bg-slate-100">
                            <div class="flex items-center gap-3">
                                <i data-lucide="download" class="w-5 h-5 text-emerald-600"></i>
                                <span class="text-sm font-medium uppercase">Exportar Dados (JSON)</span>
                            </div>
                            <i data-lucide="chevron-right" class="w-4 h-4 text-slate-400"></i>
                        </button>
                        <button onclick="clearData()" class="w-full flex items-center justify-between p-4 bg-red-50 rounded-xl border border-red-100 active:bg-red-100">
                            <div class="flex items-center gap-3">
                                <i data-lucide="trash-2" class="w-5 h-5 text-red-600"></i>
                                <span class="text-sm font-medium text-red-600 uppercase">Limpar Tudo</span>
                            </div>
                            <i data-lucide="chevron-right" class="w-4 h-4 text-red-300"></i>
                        </button>
                    </div>
                </div>

                <div class="text-center py-4">
                    <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest">Agente de Trânsito v2.0</p>
                    <p class="text-[10px] text-slate-300 uppercase">Desenvolvido para Agentes de Trânsito</p>
                </div>
            `;
            container.appendChild(div);
            lucide.createIcons();
            
            document.getElementById('profile-form').onsubmit = (e) => {
                e.preventDefault();
                const formData = new FormData(e.target);
                state.settings.agente = formData.get('agente');
                state.settings.vtr = formData.get('vtr');
                saveState();
                showToast('Perfil atualizado!');
            };

            const sheetsForm = document.getElementById('sheets-form');
            if (sheetsForm) {
                sheetsForm.onsubmit = (e) => {
                    e.preventDefault();
                    const formData = new FormData(e.target);
                    state.settings.urlKM = formData.get('urlKM');
                    state.settings.urlOcorrencia = formData.get('urlOcorrencia');
                    saveState();
                    showToast('Configurações de integração salvas!');
                };
            }
        }

        function exportData() {
            const data = JSON.stringify(state, null, 2);
            const blob = new Blob([data], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `backup-vtr-${new Date().toISOString().split('T')[0]}.json`;
            a.click();
            showToast('Backup gerado!');
        }

        function clearData() {
            showModal(`
                <div class="text-center space-y-4">
                    <div class="w-16 h-16 bg-red-100 text-red-600 rounded-full flex items-center justify-center mx-auto">
                        <i data-lucide="alert-octagon" class="w-8 h-8"></i>
                    </div>
                    <h3 class="text-lg font-bold">Limpar todos os dados?</h3>
                    <p class="text-sm text-slate-500">Isso apagará permanentemente todo o seu histórico e configurações.</p>
                    <div class="flex gap-2">
                        <button onclick="closeModal()" class="flex-1 py-3 border border-slate-200 rounded-xl font-bold">Cancelar</button>
                        <button onclick="confirmClearData()" class="flex-1 py-3 bg-red-600 text-white rounded-xl font-bold">Limpar</button>
                    </div>
                </div>
            `);
            lucide.createIcons();
        }

        window.confirmClearData = () => {
            localStorage.clear();
            location.reload();
        };

        // --- Toast System ---
        function showToast(message, type = 'success') {
            const toast = document.createElement('div');
            const bgColor = type === 'error' ? 'bg-red-600' : 'bg-emerald-600';
            toast.className = `fixed bottom-20 left-1/2 -translate-x-1/2 z-[100] ${bgColor} text-white px-6 py-3 rounded-full text-sm font-bold shadow-2xl animate-slide-up flex items-center gap-2`;
            
            const icon = type === 'error' ? '<i data-lucide="alert-circle" class="w-4 h-4"></i>' : '<i data-lucide="check-circle" class="w-4 h-4"></i>';
            toast.innerHTML = `${icon} <span>${message}</span>`;
            
            document.body.appendChild(toast);
            lucide.createIcons();
            
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translate(-50%, 20px)';
                toast.style.transition = 'all 0.3s ease';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        // --- Modal System ---
        function showModal(content) {
            const container = document.getElementById('modal-container');
            const modalContent = document.getElementById('modal-content');
            modalContent.innerHTML = content;
            
            // Reset classes before showing
            container.classList.remove('hidden');
            
            // Force reflow
            container.offsetHeight;
            
            container.style.opacity = '1';
            modalContent.style.opacity = '1';
            modalContent.style.transform = 'translateY(0) scale(1)';
            
            lucide.createIcons();
        }

        function closeModal() {
            const container = document.getElementById('modal-container');
            const modalContent = document.getElementById('modal-content');
            
            container.style.opacity = '0';
            modalContent.style.opacity = '0';
            modalContent.style.transform = 'translateY(20px) scale(0.95)';
            
            setTimeout(() => {
                container.classList.add('hidden');
            }, 300);
        }

        // --- Initialization ---
        window.onload = () => {
            render();
            updateStatusBadge();
            
            // Close modal on outside click
            document.getElementById('modal-container').onclick = (e) => {
                if (e.target.id === 'modal-container') closeModal();
            };
        };
    </script>
</body>
</html>
